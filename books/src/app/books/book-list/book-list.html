@if (books && books.length > 0) {
Die Bücher:
<div>
    <table border="1">
        <tr>
            <th>ISBN</th>
            <th>Titel</th>
            <th>Preis</th>
            <th>Aktion</th>
        </tr>
        @for (book of books; track book; let i = $index) {
        <tr>
            <td>{{i+1}}: {{ book.isbn }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.price }}</td>
            <td><button (click)="deleteBook(book.isbn)">Löschen</button></td>
        </tr>
        }
    </table>
</div>
}

@if (books?.length === 0) {
<div>Leider noch keine Bücher vorhanden.</div>
}
