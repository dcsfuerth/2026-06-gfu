<div class="calculator">
  <h2 class="calculator__title">Taschenrechner</h2>

  <div class="calculator__inputs">
    <input type="number" class="calculator__input" placeholder="Wert x" aria-label="Wert x" [(ngModel)]="x" />
    <input type="number" class="calculator__input" placeholder="Wert y" aria-label="Wert y" [(ngModel)]="y" />
  </div>

  <div class="calculator__actions">
    <button type="button" class="btn btn--primary" (click)="add()">+</button>
    <button type="button" class="btn btn--primary" (click)="subtract()">−</button>
    <button type="button" class="btn btn--ghost" (click)="clear()">C</button>
  </div>

  <div class="calculator__result">
    <span class="calculator__result-label">Ergebnis</span>
    <span class="calculator__result-value">{{ result }}</span>
  </div>
</div>
