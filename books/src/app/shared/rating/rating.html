<div class="rating">
  <span class="rating__stars" [attr.aria-label]="stars + ' von ' + maxStars + ' Sternen'">
    @for (fill of starFills; track $index) {
      <span class="rating__star" aria-hidden="true">
        <svg class="rating__star-icon" viewBox="0 0 24 24" focusable="false">
          <path d="M12 2l2.9 6.26 6.87.6-5.2 4.52 1.56 6.72L12 17.27 5.87 20.1l1.56-6.72-5.2-4.52 6.87-.6L12 2z" />
        </svg>
        <span class="rating__star-fill" [style.width.%]="fill">
          <svg class="rating__star-icon" viewBox="0 0 24 24" focusable="false">
            <path d="M12 2l2.9 6.26 6.87.6-5.2 4.52 1.56 6.72L12 17.27 5.87 20.1l1.56-6.72-5.2-4.52 6.87-.6L12 2z" />
          </svg>
        </span>
      </span>
    }
  </span>

  <button
    type="button"
    class="rating__btn rating__btn--up"
    [attr.aria-label]="'Bewertung erhöhen'"
    (click)="upvote()"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M2 21h3V9H2v12zm20-11a2 2 0 0 0-2-2h-6.31l.95-4.57.03-.32a1.5 1.5 0 0 0-.44-1.06L13.17 1 6.59 7.59A2 2 0 0 0 6 9v10a2 2 0 0 0 2 2h9a2 2 0 0 0 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" />
    </svg>
  </button>

  <button
    type="button"
    class="rating__btn rating__btn--down"
    [attr.aria-label]="'Bewertung verringern'"
    (click)="downvote()"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M22 3h-3v12h3V3zM2 14a2 2 0 0 0 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 23l6.58-6.59A2 2 0 0 0 18 15V5a2 2 0 0 0-2-2H7a2 2 0 0 0-1.84 1.22L2.14 11.27c-.09.23-.14.47-.14.73v2z" />
    </svg>
  </button>
</div>
